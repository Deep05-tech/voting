services:
  - type: web
    name: voting-portal
    env: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    
    # We mount a persistent disk so that the SQLite database is not lost 
    # when the Render server goes to sleep or restarts.
    disk:
      name: data
      mountPath: /data
      sizeGB: 1
      
    envVars:
      # Automatically set the database to use the persistent disk
      - key: DATABASE_URL
        value: file:/data/sqlite.db
        
      # Automatically generate a secure random string for admin sessions
      - key: JWT_SECRET
        generateValue: true
